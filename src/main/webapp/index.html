<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zepto Clone</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f6f6f6;
}

/* Navbar */

.navbar{
background:#6f00ff;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav-right{
display:flex;
gap:20px;
}

.nav-right div{
cursor:pointer;
}

/* Search */

.search-bar{
padding:15px 40px;
background:white;
}

.search-bar input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

/* Banner */

.banner{
margin:20px 40px;
background:linear-gradient(90deg,#7b2cff,#c46fff);
color:white;
padding:30px;
border-radius:10px;
font-size:20px;
font-weight:bold;
}

/* Categories */

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
padding:20px 40px;
}

.category{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.category:hover{
transform:scale(1.05);
}

/* Products */

.products{
padding:20px 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product-card img{
width:100%;
height:120px;
object-fit:contain;
}

.product-title{
font-size:14px;
margin:10px 0;
}

.price{
font-weight:bold;
}

button{
background:#6f00ff;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#5a00d6;
}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">
<div class="logo">Zepto</div>
<div class="nav-right">
<div>Login</div>
<div>Orders</div>
<div>Cart 🛒</div>
</div>
</div>

<!-- Search -->

<div class="search-bar">
<input type="text" placeholder="Search for products...">
</div>

<!-- Banner -->

<div class="banner">
⚡ 10 Minute Grocery Delivery
</div>

<!-- Categories -->

<div class="categories">

<div class="category">Fruits</div>
<div class="category">Vegetables</div>
<div class="category">Dairy</div>
<div class="category">Snacks</div>
<div class="category">Drinks</div>
<div class="category">Instant Food</div>

</div>

<!-- Products -->

<div class="products">

<div class="product-card">
<img src="https://cdn-icons-png.flaticon.com/512/415/415682.png">
<div class="product-title">Fresh Apples</div>
<div class="price">₹120</div>
<button>Add to Cart</button>
</div>

<div class="product-card">
<img src="https://cdn-icons-png.flaticon.com/512/590/590685.png">
<div class="product-title">Bananas</div>
<div class="price">₹60</div>
<button>Add to Cart</button>
</div>

<div class="product-card">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<div class="product-title">Milk 1L</div>
<div class="price">₹55</div>
<button>Add to Cart</button>
</div>

<div class="product-card">
<img src="https://cdn-icons-png.flaticon.com/512/135/135620.png">
<div class="product-title">Potato Chips</div>
<div class="price">₹40</div>
<button>Add to Cart</button>
</div>

</div>

<script>

let buttons=document.querySelectorAll("button")

buttons.forEach(btn=>{
btn.addEventListener("click",()=>{
alert("Item added to cart")
})
})

</script>

</body>
</html>
